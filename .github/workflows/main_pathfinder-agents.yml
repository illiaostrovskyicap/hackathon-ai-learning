name: Build and deploy Python app to Azure Web App - pathfinder-agents

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: pathfinder-ai-agents
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload agents artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            pathfinder-ai-agents/**
            !pathfinder-ai-agents/.venv/
            !pathfinder-ai-agents/.env
            !pathfinder-ai-agents/__pycache__/
            !pathfinder-ai-agents/.pytest_cache/
            !pathfinder-ai-agents/.ruff_cache/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B13CE7A5D1E34A9B96088A47A259B30A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_93741EF9C8AC4CDCBDD90AF91EA118F2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D5B3D65F640F4A7095D8D26F1037DADB }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'pathfinder-agents'
          slot-name: 'Production'
          package: pathfinder-ai-agents